<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeedUltra Rewards</title>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            max-width: 320px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .icon { font-size: 56px; margin-bottom: 16px; }
        h1 { font-size: 22px; margin-bottom: 8px; font-weight: 700; }
        p { color: #8892b0; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            background: linear-gradient(135deg, #0088cc, #00b4d8);
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,136,204,0.4); }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { background: #2a2a3e; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn.success { background: linear-gradient(135deg, #00c853, #00e676); }
        .footer { margin-top: 24px; font-size: 11px; color: #444; }
        .status { margin-top: 16px; font-size: 13px; color: #0088cc; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">💎</div>
        <h1>Earn Credits</h1>
        <p>Watch a short video to earn 1 upscale credit for <b>SeedUltra Bot</b>.</p>
        
        <button id="adBtn" class="btn">📺 Watch Video Ad</button>
        <div id="status" class="status"></div>
        
        <div class="footer">Powered by SeedUltra</div>
    </div>

    <script>
        // Only the Adsgram Block ID — NO secrets, NO backend URLs
        const BLOCK_ID = "29811";
        const BOT_LINK = "https://t.me/SeedUltra_bot";

        const adBtn = document.getElementById('adBtn');
        const statusEl = document.getElementById('status');

        // Initialize Adsgram SDK
        const AdController = window.Adsgram.init({ blockId: BLOCK_ID });

        adBtn.addEventListener('click', () => {
            adBtn.disabled = true;
            adBtn.innerText = "⏳ Loading Ad...";

            AdController.show().then(() => {
                // Ad watched successfully!
                // Adsgram S2S will automatically call our /reward endpoint.
                // We don't need to call it from here.
                adBtn.innerText = "✅ Credit Added!";
                adBtn.classList.add('success');
                statusEl.style.display = 'block';
                statusEl.innerText = "Redirecting to bot...";

                setTimeout(() => {
                    window.location.href = BOT_LINK;
                }, 2000);

            }).catch(() => {
                adBtn.disabled = false;
                adBtn.innerText = "📺 Watch Video Ad";
                statusEl.style.display = 'block';
                statusEl.style.color = '#ff5252';
                statusEl.innerText = "Ad skipped. Try again.";
            });
        });
    </script>
</body>
</html>
